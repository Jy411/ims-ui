<!doctype html>
<html class="no-js" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <link rel="stylesheet" href="css/style.css" />
    <meta name="description" content="" />

    <meta property="og:title" content="" />
    <meta property="og:type" content="" />
    <meta property="og:url" content="" />
    <meta property="og:image" content="" />
    <meta property="og:image:alt" content="" />

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.png" />

    <link rel="manifest" href="site.webmanifest" />
    <meta name="theme-color" content="#fafafa" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body class="container">
    <div class="text-center">
      <h1>Inventory Management System</h1>
    </div>

    <div>
      <h2>Inventory</h2>
      <table class="table table-striped">
        <thead>
          <tr>
            <th scope="col">#</th>
            <th scope="col">Name</th>
            <th scope="col">Description</th>
            <th scope="col">Price</th>
            <th scope="col">Quantity</th>
            <th scope="col"></th>
          </tr>
        </thead>
        <tbody id="table-body">
          <!--Populated by JavaScript-->
        </tbody>
        <tfoot>
          <form id="add-item-form" onsubmit="addItem()">
            <tr>
              <td>
                <button id="add-item" class="btn btn-primary">Add Item</button>
              </td>
              <td>
                <input type="text" id="item-name" placeholder="Name" required />
              </td>
              <td>
                <input
                  type="text"
                  id="item-description"
                  placeholder="Description"
                  required
                />
              </td>
              <td>
                <input
                  type="number"
                  id="item-price"
                  placeholder="Price"
                  required
                />
              </td>
              <td>
                <input
                  type="number"
                  id="item-quantity"
                  placeholder="Quantity"
                  required
                />
              </td>
              <td></td>
            </tr>
          </form>
        </tfoot>
      </table>

      <btn id="sign-out-btn" class="btn btn-danger">Sign Out</btn>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
      import {
        getAuth,
        createUserWithEmailAndPassword,
        signInWithEmailAndPassword,
        onAuthStateChanged,
        signOut,
      } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDTu16CzspeOGkdLD5nerKOIv3UUa6ZDmo",
        authDomain: "fir-app-58e77.firebaseapp.com",
        projectId: "fir-app-58e77",
        storageBucket: "fir-app-58e77.firebasestorage.app",
        messagingSenderId: "37149746243",
        appId: "1:37149746243:web:44b174d9906e050066e0f6",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      const signOutBtn = document.getElementById("sign-out-btn");
      signOutBtn.addEventListener("click", () => {
        signOut(auth)
          .then(() => {
            // Sign-out successful.
            window.location.href = "index.html";
          })
          .catch((error) => {
            // An error happened.
          });
      });
    </script>
  </body>
</html>
